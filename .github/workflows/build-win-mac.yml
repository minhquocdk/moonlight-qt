name: Build - Windows Portable Only
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ci_version:
        required: true
        type: string

jobs:
  build:
    env:
      CI_VERSION: ${{ inputs.ci_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            qt_version: 6.11.0

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          cache: true
          set-env: false
          add-tools-to-path: false
          version: ${{ matrix.qt_version }}
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@073e34d7c2ab4ae6961ed7cca690b3abd5ba5a7e'

      - name: Build x64 binaries (Windows)
        shell: cmd
        run: |
          set "PATH=%QT_PATH%;%PATH%"
          scripts\build-arch.bat Release x64
        env:
          QT_PATH: ${{ runner.workspace }}\Qt\${{ matrix.qt_version }}\msvc2022_64\bin

      # BỎ QUA HOÀN TOÀN BƯỚC GENERATE-BUNDLE.BAT

      - name: Upload Portable Binaries (Windows x64)
        uses: actions/upload-artifact@v5
        with:
          name: Moonlight-Windows-Portable-x64-${{ env.CI_VERSION }}
          path: build/deploy-x64-release/
          if-no-files-found: error

      - name: Upload Symbols
        uses: actions/upload-artifact@v5
        with:
          name: zDevDbgSyms-Windows-x64-${{ env.CI_VERSION }}
          path: build/symbols-x64-release/*.pdb
          if-no-files-found: error
